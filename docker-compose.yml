  mysql:
    build:
      context: .
      dockerfile: deployments/mysql.Dockerfile
    image: db-stream-mysql:local
    hostname: mysql
    container_name: db-stream-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: employee
      MYSQL_USER: db_stream
      MYSQL_PASSWORD: db_stream_password
    networks:
      - db-stream-network
    volumes:
      - mysql-data:/var/lib/mysql
    mem_limit: 256m
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # Debezium Connector for CDC
  debezium:
    build:
      context: .
      dockerfile: deployments/debezium.Dockerfile
    image: db-stream-debezium:local
    hostname: debezium
    container_name: db-stream-debezium
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      HEAP_OPTS: "-Xms128M -Xmx256M"
    mem_limit: 512m
    networks:
      - db-stream-network
      # volumes:
      #   - ./debezium/connectors:/connectors
      # extra_hosts:
      #   - "host.docker.internal:host-gateway"
      # command: >
      #   "for file in /connectors/*.json; do
      #     echo 'Registering $file...'
      #     curl -X POST -H 'Content-Type: application/json' --data @$file http://debezium:8083/connectors
      #   done"
      # command: >
      #       "for file in /connectors/*.json; do
      #         name=$$(basename \"$$file\" .json);
      #         echo \"Applying config for connector: $$name\";
      #         curl -s -X PUT -H 'Content-Type: application/json' \
      #             --data @\"$$file\" \
      #             http://debezium:8083/connectors/$$name/config;
      #         echo \"\n\";
      # done"

  clickhouse-sink:
    build:
      context: ./debezium/clickhouse-sink
      dockerfile: Dockerfile
    image: db-stream-clickhouse-sink:local
    container_name: db-stream-clickhouse-sink
    platform: linux/amd64
    mem_limit: 2g
    ports:
      - "8084:8083"
    environment:
      - KAFKA_HEAP_OPTS=-Xms512M -Xmx1024M
      - GROUP_ID=clickhouse-sink-connect-cluster
      # - internal topics for state management,for single node config, not sure about multi node or replicated nodes.
      - CONFIG_STORAGE_TOPIC=clickhouse_sink_connect_configs
      - OFFSET_STORAGE_TOPIC=clickhouse_sink_connect_offsets
      - STATUS_STORAGE_TOPIC=clickhouse_sink_connect_statuses
      - CONFIG_STORAGE_REPLICATION_FACTOR=1
      - OFFSET_STORAGE_REPLICATION_FACTOR=1
      - STATUS_STORAGE_REPLICATION_FACTOR=1

      - CLICKHOUSE_SERVER_URL=http://clickhouse:8123
      - CLICKHOUSE_SERVER_USER=default
      - CLICKHOUSE_SERVER_PASSWORD=
      # - CLICKHOUSE_SERVER_PORT=8123
      - CLICKHOUSE_SERVER_DATABASE=mysql_employee_mirror
      - BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKERS=kafka:29092
      - CLICKHOUSE_TOPICS_REGEX=(mysql_employee_mirror|pg_orion_mirror|pg_sirius_mirror)\..*
      # - DEBEZIUM_TOPIC_PREFIX=mysql_employee_mirror
      - REPLACINGMERGETREE_DELETE_COLUMN=__deleted
      - AUTO_CREATE_TABLES=true
      - SCHEMA_EVOLUTION=true
      - MAP_JSON_AS_STRING=true
      - MAP_UUID_AS_STRING=true
      # --- State Management (Required for restarts) ---
      # # Stores which Kafka messages were already processed inside ClickHouse
      # - OFFSET_STORAGE_JDBC_URL=jdbc:clickhouse://clickhouse:8123/altinity_sink_connector
      # - OFFSET_STORAGE_JDBC_USER=default
      # - OFFSET_STORAGE_JDBC_PASSWORD=
    networks:
      - db-stream-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/ || exit 1" ]
      interval: 20s
      timeout: 15s
      retries: 12
      start_period: 600s

  # sink-init:
