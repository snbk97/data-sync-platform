  kafka-ui:
    build:
      context: .
      dockerfile: deployments/kafka-ui.Dockerfile
    image: db-stream-kafka-ui:local
    container_name: db-stream-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8091:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: db-stream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - db-stream-network
    restart: unless-stopped
